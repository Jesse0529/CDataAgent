server:
  port: 8101

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:/tmp/cdata-test/h2/cdata;MODE=MySQL
    username: sa
    password:
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password: 123456

data:
  file:
    storage-dir: /tmp/cdata-test-files
    max-file-size: 62914560
    allowed-extensions: xlsx,xls,csv
    retention-days: 1
    cleanup:
      cron: "0 0 3 * * ?"
      stuck-hours: 1

sandbox:
  enabled: false

duckdb:
  query:
    max-result-rows: 1000
    timeout-seconds: 30
    threads: 2
    memory-limit: 512MB
