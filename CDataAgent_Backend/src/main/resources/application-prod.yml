server:
  port: ${SERVER_PORT:9999}

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: ${H2_URL}
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD:}
  redis:
    database: ${REDIS_DATABASE:1}
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    timeout: ${REDIS_TIMEOUT:5000}
  servlet:
    multipart:
      max-file-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: ''
  global-config:
    db-config:
      id-type: ASSIGN_ID

# ======================== 数据文件存储 ========================
data:
  file:
    storage-dir: ${DATA_STORAGE_DIR}
    max-file-size: 10485760
    allowed-extensions: xlsx,xls,csv
    retention-days: 7
    cleanup:
      cron: "0 0 3 * * ?"
      stuck-hours: 1

# ======================== 模型配置 ========================
model:
  default:
    provider: ${MODEL_PROVIDER}
    model-name: ${MODEL_NAME}
    base-url: ${MODEL_BASE_URL}

agent:
  global-timeout-seconds: ${AGENT_TIMEOUT:300}
  rate-limit: ${AGENT_RATE_LIMIT:2}
  executor:
    timeout-seconds: ${EXECUTOR_TIMEOUT:90}
    max-tool-calls: ${EXECUTOR_MAX_TOOL_CALLS:15}
  synthesizer:
    timeout-seconds: ${SYNTHESIZER_TIMEOUT:30}
  context:
    inject-analysis-state: true
    analysis-state-persistence:
      enabled: true
      meta-ttl-days: 3
      data-ttl-minutes: 60
      max-data-entries: 10
      max-data-entry-bytes: 51200

sandbox:
  enabled: ${SANDBOX_ENABLED:true}
  mount-dir: ${SANDBOX_MOUNT_DIR:/data/sandbox-workspace}
  execution-timeout: ${SANDBOX_EXECUTION_TIMEOUT:60}
  health-check-interval: ${SANDBOX_HEALTH_INTERVAL:60000}

duckdb:
  query:
    max-result-rows: 1000
    timeout-seconds: 30
    threads: 4
    memory-limit: 1GB

report:
  output-dir: ${REPORT_OUTPUT_DIR:/data/cdata-reports}
  max-generation-time: 30
  supported-formats: markdown,html,pdf
