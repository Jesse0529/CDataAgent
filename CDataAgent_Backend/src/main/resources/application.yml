spring:
  application:
    name: cdata-agent-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/create_table.sql
  h2:
    console:
      enabled: true
      path: /h2-console
