spring:
  application:
    name: cdata-agent-backend
  profiles:
    # 默认使用生产安全配置；本地开发须通过 SPRING_PROFILES_ACTIVE=dev 显式启用。
    default: prod
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/create_table.sql
  h2:
    console:
      enabled: false
      path: /h2-console
