spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/h2/cdata;AUTO_SERVER=TRUE;MODE=MySQL
    username: sa
    password:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 1

server:
  address: 0.0.0.0
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      id-type: ASSIGN_ID

# ======================== 数据文件存储 ========================
data:
  file:
    storage-dir: ${DATA_STORAGE_DIR:./data/cdata-files}
    max-file-size: 10485760
    allowed-extensions: xlsx,xls,csv
    retention-days: 7
    cleanup:
      cron: "0 0 3 * * ?"
      stuck-hours: 1

# ======================== 模型配置 ========================
model:
  encryption:
    key: cdata-dev-key-2024-change-in-production
  default:
    provider: DEEPSEEK
    model-name: deepseek-v4-flash
    base-url: https://api.deepseek.com

# ======================== Agent 配置 ========================
agent:
  global-timeout-seconds: 300
  rate-limit: 2
  executor:
    timeout-seconds: 90
    max-tool-calls: 15
  synthesizer:
    timeout-seconds: 30
  context:
    inject-analysis-state: true
    analysis-state-persistence:
      enabled: true
      meta-ttl-days: 3
      data-ttl-minutes: 60
      max-data-entries: 10
      max-data-entry-bytes: 51200

# ======================== 沙箱配置 ========================
sandbox:
  enabled: false
  mount-dir: /data/sandbox-workspace
  execution-timeout: 60
  health-check-interval: 60000

# ======================== DuckDB 配置 ========================
duckdb:
  query:
    max-result-rows: 1000
    timeout-seconds: 30
    threads: 4
    memory-limit: 1GB

# ======================== 报告配置 ========================
report:
  output-dir: /data/cdata-reports
  max-generation-time: 30
  supported-formats: markdown,html,pdf

logging:
  level:
    reactor.netty: TRACE
