version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: cdata-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdata-app
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      TZ: Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/sandbox-workspace:/data/sandbox-workspace
      - /data/cdata-files:/data/cdata-files
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
